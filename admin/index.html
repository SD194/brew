<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrewSync — Admin Dashboard</title>
  <meta name="description" content="BrewSync Café staff and administrator dashboard for order management, POS, and analytics."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./style.css"/>
</head>
<body>

  <!-- ═══ LOGIN SCREEN ═══ -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">B</div>
      <h1>BrewSync Admin</h1>
      <p class="login-sub">Sign in to your staff dashboard</p>
      <div class="login-form">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="admin@brewsync.cafe" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button id="loginBtn" class="btn-primary btn-full">Sign In</button>

        <p id="loginError" class="login-error"></p>
      </div>
    </div>
  </div>

  <!-- ═══ MAIN APP SHELL ═══ -->
  <div id="appShell" class="app-shell hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">B</div>
        <span class="brand-text">BrewSync</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="#orders" class="nav-item" data-page="orders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
          <span>Orders</span>
          <span id="navOrderBadge" class="nav-badge hidden">0</span>
        </a>
        <a href="#pos" class="nav-item" data-page="pos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="14" x2="6.01" y2="14"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
          <span>New Order (POS)</span>
        </a>
        <a href="#menu" class="nav-item admin-only" data-page="menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          <span>Menu Manager</span>
        </a>
        <a href="#analytics" class="nav-item admin-only" data-page="analytics">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
          <span>Analytics</span>
        </a>
        <a href="#staff" class="nav-item admin-only" data-page="staff">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          <span>Staff</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-pill">
          <div class="user-avatar" id="userAvatarSidebar">A</div>
          <div class="user-meta">
            <span class="user-name" id="userNameSidebar">Admin</span>
            <span class="user-role" id="userRoleSidebar">Administrator</span>
          </div>
        </div>
        <button id="logoutBtn" class="btn-ghost btn-sm">Logout</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <!-- TOP BAR -->
      <header class="topbar">
        <button id="sidebarToggle" class="sidebar-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2 id="pageTitle" class="page-title">Dashboard</h2>
        <div class="topbar-right">
          <span class="clock" id="topClock"></span>
        </div>
      </header>

      <!-- PAGE CONTAINER -->
      <div id="pageContainer" class="page-container">
        <!-- Pages are rendered here dynamically -->
      </div>
    </main>
  </div>

  <!-- ═══ AUDIO for new orders ═══ -->
  <audio id="newOrderSound" preload="auto">
    <source src="data:audio/wav;base64,UklGRl9vT19teleXNlbGVjdCBGSVJFRk9YIE5ldHdvcms=" type="audio/wav"/>
  </audio>

  <!-- ═══ TOAST ═══ -->
  <div id="toast" class="toast"></div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
